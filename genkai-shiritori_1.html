<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>限界しりとり チェスクロック</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;800&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #ece4d2;
    --ink: #211d19;
    --indigo-deep: #1c2740;
    --hanko: #b0392c;
    --hanko-deep: #7d2a20;
    --gold: #bd9440;
    --safe: #3f6b4d;
    --warn: #c68a2e;
    --danger: var(--hanko);
    --disabled-overlay: rgba(20,17,14,0.16);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body{ height:100%; margin:0; overflow:hidden; }
  body{
    font-family:'Zen Kaku Gothic New', sans-serif;
    background:
      radial-gradient(circle at 15% 20%, rgba(0,0,0,0.03) 0, transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(0,0,0,0.03) 0, transparent 45%),
      var(--paper);
    color:var(--ink);
    height:100vh;
    display:flex;
    flex-direction:column;
  }

  .stage{ flex:1; display:flex; flex-direction:column; min-height:0; }
  .panel{
    flex:1;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    padding:8px;
    min-height:0;
    cursor:pointer;
    transition: background 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
  }
  .panel.top{ transform:rotate(180deg); border-bottom:1px solid rgba(0,0,0,0.08); }
  .panel.bottom{ border-top:1px solid rgba(0,0,0,0.08); }

  .panel .status{ font-size:12px; letter-spacing:0.15em; color:rgba(33,29,25,0.4); font-weight:700; }
  .panel.active .status{ color:var(--hanko); }
  .panel.inactive::after{
    content:''; position:absolute; inset:0; background:var(--disabled-overlay); pointer-events:none;
  }

  .panel .name{
    font-size:clamp(16px,4vw,26px);
    font-weight:800;
    padding:2px 14px;
    border-bottom:2px solid transparent;
    text-align:center;
    max-width:90%;
    outline:none;
  }
  .panel.active .name{ border-bottom-color:var(--hanko); }

  .panel .clock{
    font-family:'Shippori Mincho', serif;
    font-size:clamp(38px,11vw,72px);
    font-weight:800;
    line-height:1;
    letter-spacing:0.02em;
  }
  .panel.timeout .clock{ color:var(--hanko); }

  .bar-track{ width:82%; max-width:340px; height:8px; border-radius:4px; background:rgba(0,0,0,0.1); overflow:hidden; }
  .bar-fill{ height:100%; background:var(--safe); width:100%; transition:width 0.2s linear, background 0.3s; }

  .panel[data-side="top"].active{ box-shadow: inset 0 -10px 24px -14px var(--hanko); }
  .panel[data-side="bottom"].active{ box-shadow: inset 0 10px 24px -14px var(--hanko); }

  .control-strip{
    background:var(--indigo-deep);
    color:var(--paper);
    padding:10px 14px 12px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
    position:relative;
    z-index:5;
    box-shadow:0 0 0 1px rgba(0,0,0,0.4);
    flex-wrap:wrap;
  }

  .duration-select{ display:flex; flex-direction:column; gap:6px; align-items:center; }
  .duration-select .label{ font-size:10px; letter-spacing:0.1em; opacity:0.6; }
  .duration-select select{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:700;
    font-size:14px;
    background:transparent;
    color:var(--paper);
    border:1px solid rgba(255,255,255,0.3);
    border-radius:4px;
    padding:6px 10px;
    cursor:pointer;
  }
  .duration-select select option{ color:var(--ink); }

  .center-controls{ display:flex; flex-direction:column; align-items:center; gap:6px; }

  .charcount-badge{ display:flex; flex-direction:column; align-items:center; gap:2px; }
  .charcount-badge .label{ font-size:10px; letter-spacing:0.1em; opacity:0.6; }
  .charcount-box{
    min-width:52px; height:52px;
    padding:0 6px;
    border:2px solid var(--gold);
    border-radius:8px;
    display:flex; align-items:baseline; justify-content:center; gap:3px;
    font-family:'Shippori Mincho', serif;
    background:rgba(255,255,255,0.05);
    transition: transform 0.15s;
  }
  .charcount-box .num{ font-size:30px; font-weight:800; }
  .charcount-box .unit{ font-size:13px; opacity:0.75; }
  .charcount-box.pulse{ animation: charpulse 0.3s ease; }
  @keyframes charpulse{ 0%{ transform:scale(1.25); } 100%{ transform:scale(1); } }

  .range-row{ display:flex; align-items:center; gap:3px; margin-top:2px; }
  .range-row select{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:11px;
    background:transparent;
    color:var(--paper);
    border:1px solid rgba(255,255,255,0.3);
    border-radius:4px;
    padding:2px 3px;
    cursor:pointer;
    width:44px;
  }
  .range-row select option{ color:var(--ink); }
  .range-tilde{ font-size:11px; opacity:0.6; }
  .main-btn{
    font-family:'Zen Kaku Gothic New', sans-serif;
    background:var(--hanko);
    color:#fff;
    border:none;
    font-weight:900;
    font-size:15px;
    letter-spacing:0.08em;
    padding:12px 22px;
    border-radius:6px;
    cursor:pointer;
    box-shadow:0 3px 0 var(--hanko-deep);
    transition:transform 0.08s, box-shadow 0.08s;
  }
  .main-btn:active{ transform:translateY(3px); box-shadow:0 0 0 var(--hanko-deep); }
  .reset-btn{
    font-family:'Zen Kaku Gothic New', sans-serif;
    background:transparent;
    border:1px solid rgba(255,255,255,0.3);
    color:var(--paper);
    font-size:11px;
    padding:5px 10px;
    border-radius:4px;
    cursor:pointer;
  }

  .random-tools{ display:flex; flex-direction:column; gap:6px; align-items:center; }
  .kana-box{
    width:52px; height:52px;
    border:2px solid var(--gold);
    border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Shippori Mincho', serif;
    font-size:28px; font-weight:800;
    background:rgba(255,255,255,0.05);
  }
  .tool-btn{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:10px;
    background:transparent;
    border:1px solid rgba(255,255,255,0.3);
    color:var(--paper);
    padding:4px 8px;
    border-radius:3px;
    cursor:pointer;
    letter-spacing:0.05em;
  }

  .picker-overlay{
    position:fixed; inset:0; background:rgba(20,17,14,0.88);
    display:none; align-items:center; justify-content:center;
    z-index:50; flex-direction:column; gap:18px;
  }
  .picker-overlay.show{ display:flex; }
  .picker-result{ font-family:'Shippori Mincho', serif; font-size:clamp(32px,8vw,64px); color:var(--paper); font-weight:800; }
  .picker-sub{ color:rgba(236,228,210,0.6); font-size:13px; letter-spacing:0.1em; }
  .picker-close{ margin-top:8px; background:var(--gold); border:none; padding:10px 26px; border-radius:5px; font-weight:800; font-size:14px; cursor:pointer; }

  .stamp{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:60; }
  .stamp.top-side{ transform:rotate(180deg); }
  .stamp .mark{
    font-family:'Shippori Mincho', serif;
    font-size:clamp(40px,12vw,100px);
    font-weight:800;
    color:var(--hanko);
    border:7px solid var(--hanko);
    border-radius:50%;
    padding:0.15em 0.35em;
    transform:rotate(-14deg) scale(2.4);
    opacity:0;
  }
  .stamp.play .mark{ animation: stampdown 0.55s cubic-bezier(.2,1.4,.4,1) forwards; }
  @keyframes stampdown{
    0%{ transform:rotate(-14deg) scale(2.4); opacity:0; }
    55%{ transform:rotate(-14deg) scale(0.94); opacity:0.95; }
    70%{ transform:rotate(-14deg) scale(1.05); opacity:0.9;}
    100%{ transform:rotate(-14deg) scale(1); opacity:0.88; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="panel top active" data-side="top" id="panelTop">
    <div class="status" id="statusTop">きみのばん!</div>
    <div class="name" contenteditable="true" spellcheck="false" id="nameTop">せんこう</div>
    <div class="clock" id="clockTop">1:00</div>
    <div class="bar-track"><div class="bar-fill" id="barTop"></div></div>
  </div>

  <div class="control-strip">
    <div class="duration-select">
      <div class="label">持ち時間(1人あたり)</div>
      <select id="bankSelect"></select>
    </div>

    <div class="center-controls">
      <button class="main-btn" id="mainBtn">スタート</button>
      <div class="charcount-badge">
        <div class="label">つぎの文字数</div>
        <div class="charcount-box" id="charCountBox"><span class="num" id="charCountNum">–</span><span class="unit">もじ</span></div>
        <div class="range-row">
          <select id="minCharSelect"></select>
          <span class="range-tilde">〜</span>
          <select id="maxCharSelect"></select>
        </div>
      </div>
      <button class="reset-btn" id="resetBtn">リセット</button>
    </div>

    <div class="random-tools">
      <div class="kana-box" id="kanaBox">?</div>
      <button class="tool-btn" id="kanaBtn">文字を引く</button>
      <button class="tool-btn" id="firstBtn">先攻を決める</button>
    </div>
  </div>

  <div class="panel bottom inactive" data-side="bottom" id="panelBottom">
    <div class="status" id="statusBottom">まって</div>
    <div class="name" contenteditable="true" spellcheck="false" id="nameBottom">こうこう</div>
    <div class="clock" id="clockBottom">1:00</div>
    <div class="bar-track"><div class="bar-fill" id="barBottom"></div></div>
  </div>
</div>

<div class="picker-overlay" id="pickerOverlay">
  <div class="picker-sub">先攻を決めています…</div>
  <div class="picker-result" id="pickerResult">?</div>
  <button class="picker-close" id="pickerClose">とじる</button>
</div>

<div class="stamp" id="stamp"><div class="mark">タイムアウト</div></div>

<script>
(function(){
  const clockTop = document.getElementById('clockTop');
  const clockBottom = document.getElementById('clockBottom');
  const barTop = document.getElementById('barTop');
  const barBottom = document.getElementById('barBottom');
  const panelTop = document.getElementById('panelTop');
  const panelBottom = document.getElementById('panelBottom');
  const statusTop = document.getElementById('statusTop');
  const statusBottom = document.getElementById('statusBottom');
  const mainBtn = document.getElementById('mainBtn');
  const resetBtn = document.getElementById('resetBtn');
  const bankSelect = document.getElementById('bankSelect');
  const stamp = document.getElementById('stamp');
  const charCountBox = document.getElementById('charCountBox');
  const charCountNum = document.getElementById('charCountNum');
  const minCharSelect = document.getElementById('minCharSelect');
  const maxCharSelect = document.getElementById('maxCharSelect');

  let MIN_CHARS = 2;
  let MAX_CHARS = 6;

  for(let n = 1; n <= 10; n++){
    const optMin = document.createElement('option');
    optMin.value = n; optMin.textContent = n;
    if(n === MIN_CHARS) optMin.selected = true;
    minCharSelect.appendChild(optMin);

    const optMax = document.createElement('option');
    optMax.value = n; optMax.textContent = n;
    if(n === MAX_CHARS) optMax.selected = true;
    maxCharSelect.appendChild(optMax);
  }

  minCharSelect.addEventListener('change', function(){
    let v = parseInt(minCharSelect.value, 10);
    if(v > MAX_CHARS){ MAX_CHARS = v; maxCharSelect.value = v; }
    MIN_CHARS = v;
  });
  maxCharSelect.addEventListener('change', function(){
    let v = parseInt(maxCharSelect.value, 10);
    if(v < MIN_CHARS){ MIN_CHARS = v; minCharSelect.value = v; }
    MAX_CHARS = v;
  });

  let bank = 60;
  let timeTop = bank;
  let timeBottom = bank;
  let activeSide = 'top';
  let running = false;
  let started = false;
  let gameOver = false;
  let intervalId = null;

  // populate duration dropdown: 10s steps from 10s to 300s, default 60s
  for(let s = 10; s <= 300; s += 10){
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = (s % 60 === 0) ? (s/60) + '分' : s + '秒';
    if(s === bank) opt.selected = true;
    bankSelect.appendChild(opt);
  }

  let audioCtx = null;
  function beep(freq, len, vol){
    try{
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.value = freq;
      gain.gain.value = vol;
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + len);
      osc.stop(audioCtx.currentTime + len);
    }catch(e){}
  }

  function fmt(t){
    t = Math.max(0, t);
    const m = Math.floor(t / 60);
    const s = Math.floor(t % 60);
    return m + ':' + String(s).padStart(2,'0');
  }

  function colorFor(t){
    const pct = t / bank;
    if(pct <= 0.2) return 'var(--danger)';
    if(pct <= 0.45) return 'var(--warn)';
    return 'var(--safe)';
  }

  function render(){
    clockTop.textContent = fmt(timeTop);
    clockBottom.textContent = fmt(timeBottom);
    barTop.style.width = Math.max(0, (timeTop/bank*100)) + '%';
    barBottom.style.width = Math.max(0, (timeBottom/bank*100)) + '%';
    barTop.style.background = colorFor(timeTop);
    barBottom.style.background = colorFor(timeBottom);

    panelTop.classList.toggle('active', activeSide === 'top' && !gameOver);
    panelTop.classList.toggle('inactive', activeSide !== 'top' || gameOver);
    panelBottom.classList.toggle('active', activeSide === 'bottom' && !gameOver);
    panelBottom.classList.toggle('inactive', activeSide !== 'bottom' || gameOver);

    statusTop.textContent = gameOver ? (timeTop <= 0 ? 'タイムアウト' : '') : (activeSide === 'top' ? 'きみのばん!' : 'まって');
    statusBottom.textContent = gameOver ? (timeBottom <= 0 ? 'タイムアウト' : '') : (activeSide === 'bottom' ? 'きみのばん!' : 'まって');

    mainBtn.textContent = !started ? 'スタート' : (running ? 'こうたい' : 'つづける');
  }

  function tick(){
    if(activeSide === 'top'){
      timeTop -= 0.1;
      if(timeTop <= 3.05 && timeTop > 0 && Math.abs(timeTop - Math.ceil(timeTop)) < 0.05) beep(520,0.08,0.05);
      if(timeTop <= 0){ timeTop = 0; endGame('top'); return; }
    } else {
      timeBottom -= 0.1;
      if(timeBottom <= 3.05 && timeBottom > 0 && Math.abs(timeBottom - Math.ceil(timeBottom)) < 0.05) beep(520,0.08,0.05);
      if(timeBottom <= 0){ timeBottom = 0; endGame('bottom'); return; }
    }
    render();
  }

  function endGame(loserSide){
    running = false;
    gameOver = true;
    clearInterval(intervalId);
    render();
    beep(180, 0.4, 0.08);
    if(navigator.vibrate) navigator.vibrate([120,60,120]);
    playStamp(loserSide);
  }

  function playStamp(side){
    stamp.classList.toggle('top-side', side === 'top');
    stamp.classList.remove('play');
    void stamp.offsetWidth;
    stamp.classList.add('play');
  }

  function startTicking(rollChars){
    running = true;
    started = true;
    clearInterval(intervalId);
    intervalId = setInterval(tick, 100);
    if(rollChars !== false) generateCharCount();
    render();
  }

  function pauseTicking(){
    running = false;
    clearInterval(intervalId);
    render();
  }

  function switchTurn(){
    clearInterval(intervalId);
    activeSide = activeSide === 'top' ? 'bottom' : 'top';
    startTicking();
  }

  function handlePanelTap(side){
    if(gameOver) return;
    if(side !== activeSide) return;
    if(!started){ startTicking(); return; }
    if(!running) return;
    switchTurn();
  }

  panelTop.addEventListener('click', function(){ handlePanelTap('top'); });
  panelBottom.addEventListener('click', function(){ handlePanelTap('bottom'); });

  document.querySelectorAll('.name').forEach(function(el){
    el.addEventListener('click', function(e){ e.stopPropagation(); });
    el.addEventListener('keydown', function(e){ if(e.key === 'Enter') e.preventDefault(); });
    el.addEventListener('focus', function(){ document.getSelection().selectAllChildren(el); });
  });

  mainBtn.addEventListener('click', function(){
    if(gameOver) return;
    if(!started){ startTicking(); return; }
    if(running){ pauseTicking(); } else { startTicking(false); }
  });

  resetBtn.addEventListener('click', function(){
    clearInterval(intervalId);
    timeTop = bank;
    timeBottom = bank;
    running = false;
    started = false;
    gameOver = false;
    stamp.classList.remove('play');
    charCountNum.textContent = '–';
    render();
  });

  bankSelect.addEventListener('change', function(){
    bank = parseInt(bankSelect.value, 10);
    clearInterval(intervalId);
    timeTop = bank;
    timeBottom = bank;
    running = false;
    started = false;
    gameOver = false;
    charCountNum.textContent = '–';
    render();
  });

  function generateCharCount(){
    const n = MIN_CHARS + Math.floor(Math.random() * (MAX_CHARS - MIN_CHARS + 1));
    charCountNum.textContent = n;
    charCountBox.classList.remove('pulse');
    void charCountBox.offsetWidth;
    charCountBox.classList.add('pulse');
    if(navigator.vibrate) navigator.vibrate(15);
  }

  const KANA = ['あ','い','う','え','お','か','き','く','け','こ','さ','し','す','せ','そ',
    'た','ち','つ','て','と','な','に','ぬ','ね','の','は','ひ','ふ','へ','ほ',
    'ま','み','む','め','も','や','ゆ','よ','ら','り','る','れ','ろ','わ'];
  const kanaBox = document.getElementById('kanaBox');
  const kanaBtn = document.getElementById('kanaBtn');
  kanaBtn.addEventListener('click', function(e){
    e.stopPropagation();
    let count = 0;
    const spin = setInterval(function(){
      kanaBox.textContent = KANA[Math.floor(Math.random()*KANA.length)];
      count++;
      if(count > 12){ clearInterval(spin); if(navigator.vibrate) navigator.vibrate(30); }
    }, 45);
  });

  const firstBtn = document.getElementById('firstBtn');
  const pickerOverlay = document.getElementById('pickerOverlay');
  const pickerResult = document.getElementById('pickerResult');
  const pickerClose = document.getElementById('pickerClose');

  firstBtn.addEventListener('click', function(e){
    e.stopPropagation();
    if(started && running) return;
    pickerOverlay.classList.add('show');
    const nameA = document.getElementById('nameTop').textContent.trim() || '上';
    const nameB = document.getElementById('nameBottom').textContent.trim() || '下';
    let count = 0;
    const spin = setInterval(function(){
      pickerResult.textContent = Math.random() < 0.5 ? nameA : nameB;
      count++;
      if(count > 14){
        clearInterval(spin);
        const winnerIsTop = Math.random() < 0.5;
        pickerResult.textContent = winnerIsTop ? nameA : nameB;
        activeSide = winnerIsTop ? 'top' : 'bottom';
        render();
        if(navigator.vibrate) navigator.vibrate(60);
      }
    }, 60);
  });
  pickerClose.addEventListener('click', function(e){
    e.stopPropagation();
    pickerOverlay.classList.remove('show');
  });

  render();
})();
</script>
</body>
</html>
